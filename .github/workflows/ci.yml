name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          CYRIUS_VERSION="${CYRIUS_VERSION:-$(grep -oP '(?<=^cyrius = ")[^"]+' cyrius.cyml)}"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p "$HOME/.cyrius/bin" "$HOME/.cyrius/lib"
          cp "$CYRIUS_DIR/bin/"* "$HOME/.cyrius/bin/" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$HOME/.cyrius/lib/" 2>/dev/null || true
          chmod +x "$HOME/.cyrius/bin/"* 2>/dev/null || true
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV

      - name: Resolve dependencies
        run: cyrius deps

      - name: Verify dep hashes
        # cyrius.lock is committed; mismatch fails the build.
        # Skipped on first run when no lockfile exists yet.
        run: |
          if [ -f cyrius.lock ]; then
            cyrius deps --verify
          else
            echo "::warning::no cyrius.lock committed yet — skipping verify"
          fi

      - name: Lint
        # A file fails the step on either non-zero rc OR a `^  warn ` line in
        # stdout — defense in depth. Historically `cyrius lint` returned the
        # warning count as its exit code; as of 6.2.11 it exits 0 even with
        # warnings (issues/archived/2026-04-26-cyrius-lint-rc-as-warning-count),
        # so the stdout `^  warn ` grep is now the load-bearing condition. The
        # `set +e` here keeps the loop alive past a per-file warning so the
        # report covers every file (under GHA's default `set -eo pipefail`,
        # `out=$(failing_cmd)` would otherwise abort the whole run on the
        # first file with a warning, masking which file tripped it).
        run: |
          set +e
          fail=0
          for f in src/*.cyr examples/*.cyr tests/*.tcyr tests/*.bcyr tests/*.fcyr; do
            [ -f "$f" ] || continue
            echo "=== cyrlint: $f ==="
            out=$(cyrius lint "$f" 2>&1)
            rc=$?
            echo "$out"
            if [ "$rc" -ne 0 ] || echo "$out" | grep -qE '^\s*warn '; then
              echo "::error file=$f::cyrius lint failed (rc=$rc)"
              fail=1
            fi
          done
          [ $fail -eq 0 ] || { echo "lint: warnings present"; exit 1; }

      - name: Format check
        # `cyrius fmt <file> --check` signals drift via EXIT CODE; in check
        # mode it writes nothing to stdout (its report goes to stderr), so
        # never diff its stdout against the file — that always "differs" for
        # a non-empty file and fails every file (the old bug). Aggregate the
        # rc across files so every drifted file is annotated, not just the
        # first. Matches abaco's gate.
        run: |
          fail=0
          for f in src/*.cyr examples/*.cyr tests/*.tcyr tests/*.bcyr tests/*.fcyr; do
            [ -f "$f" ] || continue
            cyrius fmt "$f" --check >/dev/null 2>&1 || {
              echo "::error file=$f::fmt drift — run 'cyrius fmt $f > tmp && mv tmp $f'"
              fail=1
            }
          done
          [ $fail -eq 0 ] || { echo "fmt: drift detected"; exit 1; }

      - name: Vet
        run: cyrius vet src/main.cyr

      - name: Verify dist bundle is in sync with lib/
        # `cyrius distlib` regenerates `dist/hisab.cyr` from the [lib]
        # modules list. Fails CI if the committed bundle drifts from
        # what the current lib/ would produce — run `cyrius distlib`
        # locally and commit the result before pushing.
        run: |
          cyrius distlib
          if ! git diff --quiet dist/hisab.cyr; then
            echo "ERROR: dist/hisab.cyr is stale. Run 'cyrius distlib' and commit."
            git --no-pager diff dist/hisab.cyr | head -40
            exit 1
          fi
          echo "dist/hisab.cyr matches lib/"

      - name: Build
        run: |
          mkdir -p build
          cyrius build src/main.cyr build/hisab
          echo "hisab: $(wc -c < build/hisab) bytes"

      - name: Verify ELF
        run: xxd -l 4 build/hisab | grep -q "7f45 4c46"

      - name: Test
        run: |
          for f in tests/*.tcyr; do
            [ -f "$f" ] || continue
            echo "::group::test $f"
            cyrius test "$f"
            echo "::endgroup::"
          done

      - name: Fuzz
        run: |
          for f in tests/*.fcyr; do
            [ -f "$f" ] || continue
            name=$(basename "$f" .fcyr)
            cyrius build "$f" "build/$name"
            timeout 10 "build/$name" || { echo "FUZZ CRASH: $name"; exit 1; }
            echo "  $name: ok"
          done

      - name: Bench
        run: |
          for f in tests/*.bcyr; do
            [ -f "$f" ] || continue
            cyrius bench "$f"
          done

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required files
        run: |
          MISSING=0
          for f in README.md CHANGELOG.md VERSION CONTRIBUTING.md SECURITY.md LICENSE cyrius.cyml; do
            if [ -f "$f" ]; then echo "  OK: $f"
            else echo "  MISSING: $f"; MISSING=1; fi
          done
          exit $MISSING

      - name: Verify version consistency
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "VERSION file: $VERSION"
          # VERSION is the single source of truth; confirm the manifest pin
          # template is intact (matches abaco) before checking the changelog.
          grep -qF 'version = "${file:VERSION}"' cyrius.cyml \
            || { echo "FAIL: cyrius.cyml version is not \${file:VERSION}"; exit 1; }
          grep -q "$VERSION" CHANGELOG.md || { echo "FAIL: version not in CHANGELOG.md"; exit 1; }
          echo "Version consistent (manifest pulls VERSION via \${file:VERSION})"

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for dangerous patterns
        # Mirrors abaco's security gate. Now that the 34 math modules live in
        # src/, this scans the full library surface. Comment lines are ignored.
        run: |
          FAIL=0
          scan() {
            local label="$1"; shift
            local pat="$1"; shift
            local hits
            hits=$(grep -rn "$pat" src/ 2>/dev/null | awk -F: '
              { line=$3; for(i=4;i<=NF;i++) line=line":"$i;
                sub(/^[[:space:]]+/,"",line);
                if (substr(line,1,1) != "#") print $1":"$2":"line }')
            if [ -n "$hits" ]; then
              echo "FAIL: $label"; echo "$hits"; FAIL=1
            fi
          }
          scan "raw execve"      'syscall\(\s*59'
          scan "raw fork"        'syscall\(\s*57'
          scan "sys_system"      '\bsys_system\s*\('
          scan "writes to /etc"  '"/etc/'
          scan "writes to /bin"  '"/bin/'
          scan "writes to /sbin" '"/sbin/'
          awk -F: '
            /var [A-Za-z_][A-Za-z0-9_]*\[[0-9]+\]/ {
              match($0, /\[[0-9]+\]/); s=substr($0,RSTART+1,RLENGTH-2); n=s+0;
              if (n >= 65536) print FILENAME":"NR": large stack buffer ("n" bytes): "$0
            }' src/*.cyr | tee /tmp/bigbuf.txt
          [ -s /tmp/bigbuf.txt ] && FAIL=1
          echo "security scan complete (fail: $FAIL)"
          exit $FAIL
