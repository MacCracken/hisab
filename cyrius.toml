[package]
name = "hisab"
version = "2.0.0"
description = "hisab — higher mathematics library (linear algebra, geometry, calculus, numerical methods)"
license = "GPL-3.0-only"
repository = "https://github.com/MacCracken/hisab"

[build]
src = "src/main.cyr"
output = "build/hisab"

[deps]
stdlib = ["string", "fmt", "alloc", "vec", "str", "syscalls", "io", "args", "assert", "math", "matrix", "linalg", "tagged", "fnptr", "bench", "callback"]

[deps.sakshi]
git = "https://github.com/MacCracken/sakshi.git"
tag = "0.9.0"
modules = ["sakshi.cyr"]
